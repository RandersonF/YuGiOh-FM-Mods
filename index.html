<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Yu-Gi-Oh! FM Mods</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="./style.css?v=3" />
  <script src="./app.js?v=3" defer></script>
</head>
<body>
  <!-- Background da aplicação (estilo fárao/hieroglifos) -->
  <div class="app-bg"></div>

  <div class="app-layout">
    <!-- SIDEBAR ESQUERDA -->
    <aside class="sidebar-left">
      <div class="brand">
        <div class="brand-logo">
          <img src="favicon.jpg" alt="Logo" class="logo-img">
        </div>
        <h1>Forbidden Memories<br><span class="brand-db">DATABASE</span></h1>
      </div>

      <nav class="nav-menu">
        <a href="#" class="nav-item"><i class="icon"></i> INÍCIO</a>
        
        <div class="nav-group">BANCO DE CARTAS</div>
        <!-- tabCards and tabDuelists moved to nav-items -->
        <button id="tabCards" class="nav-item active" role="tab" aria-selected="true">Cartas Base</button>
        <button id="tabDuelists" class="nav-item" role="tab" aria-selected="false">Duelistas</button>
      </nav>
      
      <div class="sidebar-bottom">
        <div class="field mod-field">
          <label>Mod Atual</label>
          <select id="modPick" disabled>
            <option value="">Carregando mods…</option>
          </select>
        </div>
      </div>
    </aside>

    <!-- ÁREA CENTRAL -->
    <main class="main-content">
      <header class="top-header">
        <div class="search-wrap">
          <input id="qName" type="text" placeholder="Pesquisar cartas, mods, drops..." />
        </div>
        <div class="status-wrap">
          <span id="statusDot" class="dot warn"></span>
          <div class="status-info">
            <b id="statusTitle">Inicializando…</b>
            <span id="statusText" class="msg">Carregando…</span>
          </div>
        </div>
      </header>

      <div class="content-header">
        <h2>BANCO DE CARTAS - FM & MODS <button class="btn-gold">GOLD</button></h2>
      </div>

      <!-- PANEL: CARTAS -->
      <section id="panelCards">
        <div class="filters-card">
          <div class="filters-title">Filtros avançados:</div>
          <div class="filters-row">
            <div class="field" style="width: 80px;">
              <label>ID</label>
              <input id="qId" type="number" placeholder="Ex: 1" />
            </div>
            <div class="field">
              <label>Tipo</label>
              <select id="qType"></select>
            </div>
            <div class="field">
              <label>Atributo</label>
              <select id="qAttr"></select>
            </div>
            <div class="field">
              <label>Nível / Estrelas</label>
              <select id="qStar"></select>
            </div>
            <div class="field">
              <label>Origem (Drop)</label>
              <select id="qDuelist"></select>
            </div>
            <div class="field">
              <label>Rank (Drop)</label>
              <select id="qDuelRank">
                <option value="">Todos</option>
                <option value="0">Deck</option>
                <option value="1">Z POW</option>
                <option value="2">S POW</option>
                <option value="3">S TEC</option>
              </select>
            </div>
            <div class="field align-bottom">
              <button id="btnClear" class="btn" type="button" disabled>LIMPAR</button>
            </div>
          </div>
        </div>

        <div class="results-header">
          <div class="small" id="resultMeta">0 resultados</div>
        </div>

        <div id="list" class="grid-list"></div>
      </section>

      <!-- PANEL: DUELISTAS -->
      <section id="panelDuelists" hidden>
        <div class="filters-card">
          <div class="filters-row">
            <div class="field" style="flex:1; max-width: 400px;">
              <label>Escolha o duelista</label>
              <div id="duelistPickContainer" class="custom-select-container">
                <select id="duelistPick"></select>
              </div>
            </div>
            
            <div id="duelistMeta" class="small align-bottom" style="margin-left:auto; line-height:38px;">Selecione um duelista.</div>
          </div>
          <label style="display:none; align-items:center; gap:8px; margin-top:10px; user-select:none;">
            <input id="duelistHideZero" type="checkbox" />
            <span>Ocultar linhas sem chance</span>
          </label>
        </div>

        <div class="card" style="margin-top:20px; background:transparent; box-shadow:none;">
          <div class="subtabs" role="tablist" aria-label="Filtro de cartas do duelista">
            <button class="subtab active" role="tab" aria-selected="true" data-duel-tab="all" id="duelTabAll"><span class="label">Tudo</span><span class="badge" aria-hidden="true">0</span></button>
            <button class="subtab" role="tab" aria-selected="false" data-duel-tab="deck" id="duelTabDeck"><span class="label">Deck</span><span class="badge" aria-hidden="true">0</span></button>
            <button class="subtab" role="tab" aria-selected="false" data-duel-tab="zpow" id="duelTabZ"><span class="label">Z POW</span><span class="badge" aria-hidden="true">0</span></button>
            <button class="subtab" role="tab" aria-selected="false" data-duel-tab="spow" id="duelTabSP"><span class="label">S POW</span><span class="badge" aria-hidden="true">0</span></button>
            <button class="subtab" role="tab" aria-selected="false" data-duel-tab="stec" id="duelTabST"><span class="label">S TEC</span><span class="badge" aria-hidden="true">0</span></button>
          </div>
          <div class="table-container">
            <table class="table">
              <thead id="duelistThead">
                <tr>
                  <th style="width:70px">ID</th>
                  <th>CARTA</th>
                  <th style="width:100px">DECK</th>
                  <th style="width:100px">Z POW</th>
                  <th style="width:100px">S POW</th>
                  <th style="width:100px">S TEC</th>
                </tr>
              </thead>
              <tbody id="duelistTbody"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>

    <!-- SIDEBAR DIREITA -->
    <aside class="sidebar-right">
      <div id="detailMeta" class="small" style="display:none">Selecione uma carta na lista.</div>
      <div id="details" class="details-container"></div>
    </aside>
  </div>
</body>
</html>
